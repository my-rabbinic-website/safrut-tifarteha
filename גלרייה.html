<head>

    <title>גלריית אירועים | ספרות תפארתך - חנות הספרות סת''ם פרימיום</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;800&family=Frank+Ruhl+Libre:wght@300;400;700;900&display=swap" rel="stylesheet">

    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 
                        sans: ['Assistant', 'sans-serif'], 
                        serif: ['Frank Ruhl Libre', 'serif'] 
                    },
                    colors: { 
                        brand: { 
                            gold: '#CBA153', 
                            darkGold: '#9A7B3E',
                            lightGold: '#FDE68A',
                            onyx: '#0A0A0A', 
                            cream: '#FCFCFA', 
                            platinum: '#E5E3DC' 
                        } 
                    },
                    boxShadow: { 
                        'luxury': '0 30px 60px -15px rgba(0,0,0,0.1)', 
                        'luxury-hover': '0 20px 40px -10px rgba(203,161,83,0.3)', 
                        'glass': '0 8px 32px 0 rgba(0, 0, 0, 0.05)',
                        'glow': '0 0 20px rgba(203,161,83,0.4)'
                    },
                    animation: {
                        'gradient-x': 'gradient-x 3s ease infinite',
                        'float': 'float 6s ease-in-out infinite',
                        'pulse-gold': 'pulse-gold 2s infinite',
                        'fade-in-up': 'fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards'
                    },
                    keyframes: {
                        'gradient-x': {
                            '0%, 100%': {
                                'background-size': '200% 200%',
                                'background-position': 'left center'
                            },
                            '50%': {
                                'background-size': '200% 200%',
                                'background-position': 'right center'
                            },
                        },
                        'float': {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        },
                        'pulse-gold': {
                            '0%': { boxShadow: '0 0 0 0 rgba(203,161,83, 0.6)' },
                            '70%': { boxShadow: '0 0 0 15px rgba(203,161,83, 0)' },
                            '100%': { boxShadow: '0 0 0 0 rgba(203,161,83, 0)' }
                        },
                        'fadeInUp': {
                            '0%': { opacity: 0, transform: 'translateY(30px)' },
                            '100%': { opacity: 1, transform: 'translateY(0)' }
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        body { 
            background-color: #FCFCFA; 
            color: #0A0A0A; 
            overflow-x: hidden; 
            -webkit-tap-highlight-color: transparent; 
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #FCFCFA; }
        ::-webkit-scrollbar-thumb { background: #CBA153; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #9A7B3E; }

        .gold-text-gradient { 
            background: linear-gradient(to right, #CBA153, #FDE68A, #CBA153); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            background-size: 200% auto;
        }
        
        .bg-noise { position: relative; z-index: 0; }
        .bg-noise::before {
            content: ""; position: fixed; inset: 0; z-index: -1; pointer-events: none; opacity: 0.25;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }
        
        /* Radial glow behind hero */
        .hero-glow {
            position: absolute;
            top: -10%; left: 50%; transform: translateX(-50%);
            width: 100vw; height: 500px;
            background: radial-gradient(circle, rgba(203,161,83,0.1) 0%, rgba(252,252,250,0) 70%);
            z-index: -1;
            pointer-events: none;
        }

        .masonry-grid { column-count: 1; column-gap: 1.5rem; }
        @media (min-width: 640px) { .masonry-grid { column-count: 2; column-gap: 2rem; } }
        @media (min-width: 1024px) { .masonry-grid { column-count: 3; column-gap: 2rem; } }

        .gallery-item {
            break-inside: avoid; margin-bottom: 1.5rem; position: relative; cursor: pointer; border-radius: 1.5rem; 
            overflow: hidden; border: 1px solid rgba(0,0,0,0.05); transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0; transform: translateY(30px);
        }
        @media (min-width: 640px) {
            .gallery-item { margin-bottom: 2rem; }
        }
        
        @media (hover: hover) {
            .gallery-item:hover { 
                transform: translateY(-8px) scale(1.01); 
                border-color: rgba(203,161,83,0.5);
                box-shadow: 0 20px 40px -10px rgba(203,161,83,0.25);
            }
            .gallery-item:hover img { transform: scale(1.08); }
            .gallery-item:hover .overlay { opacity: 1; background: linear-gradient(to top, rgba(10,10,10,0.95) 0%, rgba(10,10,10,0.4) 50%, transparent 100%); }
            .gallery-item:hover .play-icon { background: rgba(203,161,83,1); transform: translate(-50%, -50%) scale(1.1); }
        }
        
        .gallery-item img { transition: transform 0.8s cubic-bezier(0.19, 1, 0.22, 1); width: 100%; display: block; }

        .gallery-item .overlay { 
            position: absolute; inset: 0; background: linear-gradient(to top, rgba(10,10,10,0.85) 0%, transparent 70%); 
            opacity: 0.8; transition: all 0.4s ease; display: flex; flex-direction: column; justify-content: flex-end; 
            padding: 1.5rem; pointer-events: none;
        }
        @media (min-width: 640px) { 
            .gallery-item .overlay { opacity: 0; padding: 2rem; } 
        }

        .play-icon { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 56px; height: 56px; background: rgba(203,161,83,0.85); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; color: white; z-index: 20;
            backdrop-filter: blur(4px); transition: all 0.4s ease;
            pointer-events: none;
        }
        @media (min-width: 640px) {
             .play-icon { width: 70px; height: 70px; }
        }

        #lightbox { 
            display: none; position: fixed; inset: 0; z-index: 1000; 
            background: rgba(5,5,5,0.98); backdrop-filter: blur(15px);
            align-items: center; justify-content: center; opacity: 0; transition: opacity 0.4s ease;
        }
        #lightbox.active { display: flex; opacity: 1; }
        
        .lightbox-close-btn {
            position: absolute; top: 1rem; left: 1rem; padding: 0.75rem; 
            color: rgba(255,255,255,0.7); z-index: 1010; border-radius: 50%; 
            background: rgba(255,255,255,0.1); backdrop-filter: blur(4px);
            transition: all 0.3s ease;
        }
        .lightbox-close-btn:hover { color: #CBA153; background: rgba(255,255,255,0.2); transform: rotate(90deg); }
        @media (min-width: 640px) {
            .lightbox-close-btn { top: 2rem; left: 2rem; }
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        body.lightbox-open { overflow: hidden; position: fixed; width: 100%; }

        /* Filter buttons styling */
        .filter-btn { position: relative; overflow: hidden; }
        .filter-btn::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(203,161,83,0.1); transform: scale(0); transition: transform 0.3s ease; border-radius: 9999px; z-index: -1;
        }
        .filter-btn:hover::before { transform: scale(1); }
        .filter-btn.active { box-shadow: 0 4px 15px -3px rgba(203,161,83,0.4); }
    </style>
</head>

            <button onclick="filterGallery('all', this)" class="filter-btn active whitespace-nowrap px-6 py-2.5 md:px-8 md:py-3 rounded-full bg-brand-onyx text-brand-lightGold text-sm md:text-base font-bold transition-all">הכל</button>
            <button onclick="filterGallery('cat1', this)" class="filter-btn whitespace-nowrap px-6 py-2.5 md:px-8 md:py-3 rounded-full text-gray-600 hover:text-brand-onyx text-sm md:text-base font-bold transition-all">קטגוריה א'</button>
            <button onclick="filterGallery('cat2', this)" class="filter-btn whitespace-nowrap px-6 py-2.5 md:px-8 md:py-3 rounded-full text-gray-600 hover:text-brand-onyx text-sm md:text-base font-bold transition-all">קטגוריה ב'</button>

    <footer class="bg-brand-onyx text-center py-12 md:py-16 border-t-4 border-brand-gold relative overflow-hidden">
        <div class="absolute inset-0 opacity-5 bg-[url('data:image/svg+xml,%3Csvg width=\'60\' height=\'60\' viewBox=\'0 0 60 60\' xmlns=\'http://www.w3.org/2000/svg\'%3E%3Cg fill=\'none\' fill-rule=\'evenodd\'%3E%3Cg fill=\'%23CBA153\' fill-opacity=\'1\'%3E%3Cpath d=\'M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z\'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E')]"></div>
        <div class="relative z-10 flex flex-col items-center justify-center">
            <h2 class="text-2xl font-serif text-white mb-4">ספרות <span class="text-brand-gold">תפארתך</span></h2>
            <p class="text-gray-400 text-sm font-light mb-6">יוצרים רגעים בלתי נשכחים, באומנות וביוקרה.</p>

    <div id="lightbox" onclick="if(event.target === this) closeLightbox()">
        <button onclick="closeLightbox()" class="lightbox-close-btn" aria-label="Close">
            <svg class="w-6 h-6 md:w-8 md:h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
        <div class="w-full h-full max-w-6xl p-0 md:p-8 flex flex-col items-center justify-center">
            <div id="lightbox-media" class="w-full aspect-video bg-black md:rounded-2xl overflow-hidden shadow-[0_0_50px_rgba(203,161,83,0.15)] border border-brand-gold/10 flex items-center justify-center relative">
                <!-- Loader -->
                <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                    <div class="w-10 h-10 border-4 border-brand-gold/30 border-t-brand-gold rounded-full animate-spin"></div>
                </div>
            </div>
            <div class="mt-6 md:mt-8 text-center text-white px-4 max-w-3xl">
                <h3 id="lightbox-title" class="text-2xl md:text-4xl font-serif font-bold mb-2 md:mb-3 gold-text-gradient inline-block"></h3>
                <p id="lightbox-desc" class="text-gray-300 text-sm md:text-base font-light tracking-wide"></p>
            </div>
        </div>
    </div>

    <script>
        const galleryData = [
            { id: 5, type: 'video', category: 'cat1', span: 'aspect-video', title: 'שירת הלוויים', desc: 'קליפ מוזיקלי מרגש', url: 'https://youtu.be/Rfee22TYUcE?si=zu06ZWF-UMsOnZNM' },
            { id: 1, type: 'video', category: 'cat1', span: 'aspect-video', title: 'אירוע השקה מרכזי', desc: 'תיעוד חי מהשטח', url: 'https://youtu.be/pDTv1BAoRFI' },
            { id: 6, type: 'video', category: 'cat2', span: 'aspect-square', title: 'הכנות לאירוע', desc: 'הצצה בלעדית', url: 'https://youtu.be/ItkuZs27-ZE?si=_MOJhD-TmOXQ4dkF' },
            { id: 2, type: 'video', category: 'cat2', span: 'aspect-square', title: 'תהליך עבודה מקצועי', desc: 'מאחורי הקלעים של ההפקה', url: 'https://youtu.be/vO78oDri2nY' },
            { id: 3, type: 'video', category: 'cat1', span: 'aspect-[4/3]', title: 'כנס שנתי', desc: 'רגעים נבחרים מהערב', url: 'https://youtu.be/dou5806oQi8' },
            { id: 4, type: 'video', category: 'cat2', span: 'aspect-[3/4]', title: 'צילום אומנותי', desc: 'דיוק ואיכות בכל פרט', url: 'https://youtu.be/98zbfdwHEl4?si=L6zC2HZiev7pIstb' },
            { id: 7, type: 'video', category: 'cat1', span: 'aspect-video', title: 'ביצוע חי מרטיט', desc: 'מתוך אירוע מיוחד', url: 'https://youtu.be/Qn8hQnMbKL4?si=7XJOm0MamFNsf6Y8' },
            { id: 8, type: 'video', category: 'cat2', span: 'aspect-square', title: 'מאחורי הקלעים', desc: 'רגעים של קסם', url: 'https://youtu.be/Fq5DyGd869g?si=yVTol52cHjpa4zo-' },
            { id: 9, type: 'video', category: 'cat1', span: 'aspect-[4/3]', title: 'חופה מרגשת', desc: 'ליווי מוזיקלי מושלם', url: 'https://youtu.be/lvPpswQ0omo?si=lyCb8uZ-fht0NWxi' },
            { id: 10, type: 'video', category: 'cat2', span: 'aspect-video', title: 'שמחת בית השואבה', desc: 'התלהבות ושמחה', url: 'https://youtu.be/FwbFZsK_g8c?si=HuS975DGoNvt7iRo' },
            { id: 11, type: 'video', category: 'cat1', span: 'aspect-square', title: 'כנס יוקרתי', desc: 'אווירה מרוממת', url: 'https://youtu.be/CPxmKBmPfRI?si=f4MWW2I1_fUWKBk6' },
            { id: 12, type: 'video', category: 'cat2', span: 'aspect-[4/3]', title: 'הופעה פומבית', desc: 'קהל נלהב', url: 'https://youtu.be/MLC07iA97tc?si=qH5iKpMhun03IGQN' },
            { id: 13, type: 'video', category: 'cat1', span: 'aspect-video', title: 'רגע של השראה', desc: 'שירה שעולה מהלב', url: 'https://youtu.be/nx0QRYZCP8Q?si=XnWba0yS-KEFw3WJ' },
            { id: 14, type: 'video', category: 'cat2', span: 'aspect-square', title: 'סיום מרשים', desc: 'אקורד סיום עוצמתי', url: 'https://youtu.be/2hDMEHALpfk?si=HnjThrNjlvEflZoN' }
        ];

        function getYoutubeId(url) {
            const regExp = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/i;
            const match = url.match(regExp);
            return match ? match[1] : null;
        }

        function getYoutubeEmbedUrl(url) {
            const videoId = getYoutubeId(url);
            if (videoId) {
                return `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0&color=white&modestbranding=1`;
            }
            return url;
        }

        function getYoutubeThumbnail(url) {
            const videoId = getYoutubeId(url);
            if (videoId) {
                return `https://img.youtube.com/vi/${videoId}/maxresdefault.jpg`; // Changed to maxresdefault for higher quality
            }
            return 'https://placehold.co/800x600/0A0A0A/CBA153?text=Video';
        }

        function init() {
            if (typeof AOS !== 'undefined') {
                AOS.init({ once: true, duration: 1000, offset: 50, easing: 'ease-out-cubic' });
            }
            renderGallery('all');
        }

        function renderGallery(filter) {
            const container = document.getElementById('gallery-container');
            container.style.opacity = '0';
            
            setTimeout(() => {
                container.innerHTML = '';
                const items = filter === 'all' ? galleryData : galleryData.filter(i => i.category === filter);
                
                items.forEach((item, index) => {
                    const isVideo = item.type === 'video' || item.url.includes('youtu');
                    const imgUrl = isVideo ? getYoutubeThumbnail(item.url) : item.url;
                    
                    // Fallback to hqdefault if maxresdefault fails loading
                    const imgElement = `<img src="${imgUrl}" onerror="this.onerror=null;this.src='https://img.youtube.com/vi/${getYoutubeId(item.url)}/hqdefault.jpg';" class="w-full h-full object-cover" alt="${item.title}" loading="lazy">`;

                    const html = `
                        <div class="gallery-item ${item.span} group" onclick="openLightbox(${item.id})" style="animation-delay: ${index * 100}ms">
                            ${imgElement}
                            ${isVideo ? '<div class="play-icon animate-pulse-gold"><svg class="w-6 h-6 md:w-8 md:h-8 ml-1" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>' : ''}
                            <div class="overlay">
                                <h3 class="text-white font-serif font-bold text-xl md:text-2xl mb-1 transform translate-y-4 group-hover:translate-y-0 transition-transform duration-500">${item.title}</h3>
                                <div class="w-8 h-0.5 bg-brand-gold mb-2 transform scale-x-0 group-hover:scale-x-100 origin-right transition-transform duration-500 delay-100"></div>
                                <p class="text-brand-lightGold text-xs md:text-sm tracking-wide opacity-0 group-hover:opacity-100 transition-opacity duration-500 delay-200">${item.desc}</p>
                            </div>
                        </div>
                    `;
                    container.insertAdjacentHTML('beforeend', html);
                });
                
                // Trigger reflow to restart animations
                void container.offsetWidth;
                
                // Apply animation class
                const newlyAddedItems = container.querySelectorAll('.gallery-item');
                newlyAddedItems.forEach(el => el.classList.add('animate-fade-in-up'));
                
                container.style.opacity = '1';
            }, 300);
        }

        function filterGallery(cat, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => {
                b.classList.remove('bg-brand-onyx', 'text-brand-lightGold');
                b.classList.add('text-gray-600');
            });
            btn.classList.add('bg-brand-onyx', 'text-brand-lightGold');
            btn.classList.remove('text-gray-600');
            renderGallery(cat);
        }

        let scrollPosition = 0;

        function openLightbox(id) {
            const item = galleryData.find(i => i.id === id);
            if(!item) return;

            const lb = document.getElementById('lightbox');
            const media = document.getElementById('lightbox-media');
            
            document.getElementById('lightbox-title').innerText = item.title;
            document.getElementById('lightbox-desc').innerText = item.desc;
            
            // Keep the loader inside media container, append iframe above it
            const isVideo = item.type === 'video' || item.url.includes('youtu');
            if (isVideo) {
                media.innerHTML += `<iframe class="w-full h-full absolute inset-0 z-10" src="${getYoutubeEmbedUrl(item.url)}" allow="autoplay; fullscreen" frameborder="0" onload="this.style.opacity=1" style="opacity:0; transition: opacity 0.5s ease;"></iframe>`;
            } else {
                media.innerHTML += `<img src="${item.url}" class="w-full h-full object-contain absolute inset-0 z-10" onload="this.style.opacity=1" style="opacity:0; transition: opacity 0.5s ease;">`;
            }
            
            lb.classList.add('active');
            
            scrollPosition = window.pageYOffset;
            document.body.style.top = `-${scrollPosition}px`;
            document.body.classList.add('lightbox-open');
        }

        function closeLightbox() {
            const lb = document.getElementById('lightbox');
            lb.classList.remove('active');
            
            setTimeout(() => {
                // Keep only the loader div, remove iframe/img
                const media = document.getElementById('lightbox-media');
                while (media.childNodes.length > 1) {
                    media.removeChild(media.lastChild);
                }
                
                document.body.classList.remove('lightbox-open');
                document.body.style.top = '';
                window.scrollTo(0, scrollPosition);
            }, 400);
        }

        window.onload = init;
    </script>
</body>
</html>
