<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>גלריית אירועים | ספרות תפארתך</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;800&family=Frank+Ruhl+Libre:wght@300;400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 
                        sans: ['Assistant', 'sans-serif'], 
                        serif: ['Frank Ruhl Libre', 'serif'] 
                    },
                    colors: { 
                        brand: { 
                            gold: '#CBA153', 
                            darkGold: '#9A7B3E', 
                            onyx: '#0A0A0A', 
                            cream: '#FCFCFA', 
                            platinum: '#E5E3DC' 
                        } 
                    },
                    boxShadow: { 
                        'luxury': '0 30px 60px -15px rgba(0,0,0,0.1)', 
                        'luxury-hover': '0 40px 80px -15px rgba(203,161,83,0.25)', 
                        'glass': '0 8px 32px 0 rgba(0, 0, 0, 0.05)' 
                    }
                }
            }
        }
    </script>
    
    <style>
        body { background-color: #FCFCFA; color: #0A0A0A; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .gold-text-gradient { 
            background: linear-gradient(135deg, #CBA153 0%, #E8D4A2 50%, #9A7B3E 100%); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }
        
        .bg-noise { position: relative; }
        .bg-noise::before {
            content: ""; position: absolute; inset: 0; z-index: -1; pointer-events: none; opacity: 0.15;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        .masonry-grid { column-count: 1; column-gap: 1rem; }
        @media (min-width: 640px) { .masonry-grid { column-count: 2; column-gap: 1.5rem; } }
        @media (min-width: 1024px) { .masonry-grid { column-count: 3; column-gap: 1.5rem; } }

        .gallery-item {
            break-inside: avoid; margin-bottom: 1rem; position: relative; cursor: pointer; border-radius: 1rem; 
            overflow: hidden; border: 1px solid rgba(0,0,0,0.05); transition: all 0.3s ease;
        }
        @media (min-width: 640px) {
            .gallery-item { margin-bottom: 1.5rem; border-radius: 1.5rem; transition: all 0.5s ease; }
        }
        
        @media (hover: hover) {
            .gallery-item:hover { transform: translateY(-5px); }
            .gallery-item:hover img { transform: scale(1.1); }
            .gallery-item:hover .overlay { opacity: 1; }
        }
        
        .gallery-item img { transition: transform 0.8s cubic-bezier(0.19, 1, 0.22, 1); width: 100%; display: block; }

        .gallery-item .overlay { 
            position: absolute; inset: 0; background: linear-gradient(to top, rgba(10,10,10,0.9) 0%, transparent 100%); 
            opacity: 0; transition: opacity 0.4s ease; display: flex; flex-direction: column; justify-content: flex-end; 
            padding: 1.5rem; pointer-events: none; /* Prevents overlay from blocking touch events on mobile */
        }
        @media (min-width: 640px) { .gallery-item .overlay { padding: 2rem; } }
        
        /* Show overlay on touch devices by default slightly, or when tapped */
        @media (hover: none) {
            .gallery-item .overlay { opacity: 1; background: linear-gradient(to top, rgba(10,10,10,0.8) 0%, transparent 60%); }
            .gallery-item h3 { font-size: 1.1rem; }
        }

        .play-icon { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 48px; height: 48px; background: rgba(203,161,83,0.9); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; color: white; z-index: 20;
            box-shadow: 0 0 15px rgba(203,161,83,0.4); pointer-events: none;
        }
        @media (min-width: 640px) {
             .play-icon { width: 60px; height: 60px; box-shadow: 0 0 20px rgba(203,161,83,0.4); }
        }

        #lightbox { 
            display: none; position: fixed; inset: 0; z-index: 1000; 
            background: rgba(10,10,10,0.95); backdrop-filter: blur(10px);
            align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s ease;
        }
        #lightbox.active { display: flex; opacity: 1; }
        
        /* Ensure close button is easy to tap on mobile */
        .lightbox-close-btn {
            position: absolute; top: 1rem; left: 1rem; padding: 0.5rem; 
            color: white; z-index: 1010; border-radius: 50%; background: rgba(0,0,0,0.5);
        }
        @media (min-width: 640px) {
            .lightbox-close-btn { top: 1.5rem; left: 1.5rem; background: transparent; }
            .lightbox-close-btn:hover { color: #CBA153; }
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Prevent body scroll when lightbox is open on iOS */
        body.lightbox-open { overflow: hidden; position: fixed; width: 100%; }
    </style>
</head>
<body class="antialiased bg-noise">

    <header class="py-4 md:py-6 text-center bg-white/90 backdrop-blur-md sticky top-0 z-50 border-b border-black/5">
        <h1 class="text-xl md:text-3xl font-serif font-black tracking-tight">
            ספרות <span class="text-brand-gold">תפארתך</span>
        </h1>
    </header>

    <section class="pt-16 pb-8 md:pt-20 md:pb-12 px-4 text-center" data-aos="fade-up">
        <div class="max-w-4xl mx-auto">
            <span class="text-brand-gold font-bold uppercase tracking-[0.2em] md:tracking-[0.3em] text-[10px] md:text-xs mb-3 md:mb-4 block">Our Portfolio</span>
            <h2 class="text-4xl sm:text-5xl md:text-7xl font-serif font-bold gold-text-gradient mb-4 md:mb-6 leading-tight">רגעים בלתי נשכחים</h2>
            <p class="text-base md:text-lg text-gray-500 max-w-2xl mx-auto font-light leading-relaxed px-2">
                הגלריה כעת בתהליכי בנייה - תהנו בנתיים מ-'מלכות'.
            </p>
        </div>
    </section>

    <section class="sticky top-[60px] md:top-[80px] z-40 mb-8 md:mb-12 px-4 flex justify-center w-full">
        <div class="bg-white/95 backdrop-blur-xl border border-brand-gold/20 p-1 md:p-1.5 rounded-full shadow-glass flex gap-1 overflow-x-auto no-scrollbar max-w-full touch-pan-x">
            <button onclick="filterGallery('all', this)" class="filter-btn active whitespace-nowrap px-4 py-2 md:px-6 md:py-2 rounded-full bg-brand-onyx text-brand-gold text-xs font-bold transition-all">הכל</button>
            <button onclick="filterGallery('cat1', this)" class="filter-btn whitespace-nowrap px-4 py-2 md:px-6 md:py-2 rounded-full text-gray-500 hover:bg-gray-100 text-xs font-bold transition-all">קטגוריה א'</button>
            <button onclick="filterGallery('cat2', this)" class="filter-btn whitespace-nowrap px-4 py-2 md:px-6 md:py-2 rounded-full text-gray-500 hover:bg-gray-100 text-xs font-bold transition-all">קטגוריה ב'</button>
        </div>
    </section>

    <main class="max-w-[1400px] mx-auto px-4 md:px-6 pb-20 md:pb-24">
        <div id="gallery-container" class="masonry-grid transition-opacity duration-300">
            <!-- JS Content -->
        </div>
    </main>

    <div id="lightbox" onclick="if(event.target === this) closeLightbox()">
        <button onclick="closeLightbox()" class="lightbox-close-btn transition-colors" aria-label="Close">
            <svg class="w-6 h-6 md:w-8 md:h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
        <div class="w-full h-full max-w-5xl p-0 md:p-4 flex flex-col items-center justify-center">
            <div id="lightbox-media" class="w-full aspect-video bg-black md:rounded-2xl overflow-hidden shadow-2xl flex items-center justify-center"></div>
            <div class="mt-4 md:mt-6 text-center text-white px-4">
                <h3 id="lightbox-title" class="text-xl md:text-2xl font-serif mb-1 md:mb-2"></h3>
                <p id="lightbox-desc" class="text-brand-gold text-xs md:text-sm tracking-wide"></p>
            </div>
        </div>
    </div>

    <script>
        const galleryData = [
            { id: 1, type: 'video', category: 'cat1', span: 'aspect-video', title: 'אירוע השקה מרכזי', desc: 'תיעוד חי מהשטח', url: 'https://youtu.be/pDTv1BAoRFI' },
            { id: 2, type: 'video', category: 'cat2', span: 'aspect-square', title: 'תהליך עבודה מקצועי', desc: 'מאחורי הקלעים של ההפקה', url: 'https://youtu.be/vO78oDri2nY' },
            { id: 3, type: 'video', category: 'cat1', span: 'aspect-[4/3]', title: 'כנס שנתי', desc: 'רגעים נבחרים מהערב', url: 'https://youtu.be/dou5806oQi8' },
            { id: 4, type: 'image', category: 'cat2', span: 'aspect-[3/4]', title: 'צילום אומנותי', desc: 'דיוק ואיכות בכל פרט', url: 'https://youtu.be/98zbfdwHEl4?si=L6zC2HZiev7pIstb' } // Replaced invalid YT link with a placeholder image for demo
        ];

        function getYoutubeEmbedUrl(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            if (match && match[2].length === 11) {
                return `https://www.youtube.com/embed/${match[2]}?autoplay=1&rel=0`;
            }
            return url;
        }

        function getYoutubeThumbnail(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            if (match && match[2].length === 11) {
                return `https://img.youtube.com/vi/${match[2]}/hqdefault.jpg`;
            }
            return 'https://placehold.co/600x400/0A0A0A/CBA153?text=Video';
        }

        function init() {
            if (typeof AOS !== 'undefined') {
                AOS.init({ once: true, duration: 800, offset: 50 });
            } else {
                console.warn("AOS library not found.");
            }
            renderGallery('all');
        }

        function renderGallery(filter) {
            const container = document.getElementById('gallery-container');
            container.style.opacity = '0';
            
            setTimeout(() => {
                container.innerHTML = '';
                const items = filter === 'all' ? galleryData : galleryData.filter(i => i.category === filter);
                
                items.forEach(item => {
                    const isVideo = item.type === 'video' || item.url.includes('youtu');
                    const imgUrl = isVideo ? getYoutubeThumbnail(item.url) : item.url;
                    
                    const html = `
                        <div class="gallery-item ${item.span} group" onclick="openLightbox(${item.id})">
                            <img src="${imgUrl}" class="w-full h-full object-cover" alt="${item.title}" loading="lazy">
                            ${isVideo ? '<div class="play-icon"><svg class="w-5 h-5 md:w-6 md:h-6 ml-0.5 md:ml-1" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>' : ''}
                            <div class="overlay">
                                <h3 class="text-white font-bold text-lg md:text-xl mb-0.5 md:mb-1">${item.title}</h3>
                                <p class="text-brand-gold text-[10px] md:text-xs">${item.desc}</p>
                            </div>
                        </div>
                    `;
                    container.insertAdjacentHTML('beforeend', html);
                });
                container.style.opacity = '1';
            }, 250);
        }

        function filterGallery(cat, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => {
                b.classList.remove('bg-brand-onyx', 'text-brand-gold');
                b.classList.add('text-gray-500');
            });
            btn.classList.add('bg-brand-onyx', 'text-brand-gold');
            btn.classList.remove('text-gray-500');
            renderGallery(cat);
        }

        let scrollPosition = 0;

        function openLightbox(id) {
            const item = galleryData.find(i => i.id === id);
            if(!item) return;

            const lb = document.getElementById('lightbox');
            const media = document.getElementById('lightbox-media');
            
            document.getElementById('lightbox-title').innerText = item.title;
            document.getElementById('lightbox-desc').innerText = item.desc;
            
            const isVideo = item.type === 'video' || item.url.includes('youtu');
            if (isVideo) {
                media.innerHTML = `<iframe class="w-full h-full" src="${getYoutubeEmbedUrl(item.url)}" allow="autoplay; fullscreen" frameborder="0"></iframe>`;
            } else {
                media.innerHTML = `<img src="${item.url}" class="w-full h-full object-contain">`;
            }
            
            lb.classList.add('active');
            
            // Mobile scrolling fix
            scrollPosition = window.pageYOffset;
            document.body.style.top = `-${scrollPosition}px`;
            document.body.classList.add('lightbox-open');
        }

        function closeLightbox() {
            const lb = document.getElementById('lightbox');
            lb.classList.remove('active');
            
            setTimeout(() => {
                document.getElementById('lightbox-media').innerHTML = '';
                
                // Restore mobile scrolling
                document.body.classList.remove('lightbox-open');
                document.body.style.top = '';
                window.scrollTo(0, scrollPosition);
            }, 300);
        }

        window.onload = init;
    </script>
</body>
</html>
